# Runs the published image. To build from source instead, layer the dev file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  nim-proxy:
    image: ghcr.io/miztertea/nim-proxy:latest
    restart: unless-stopped
    ports:
      # Bound to loopback by default — reachable only from this host. To expose
      # it, set auth in .env (ADMIN_PASSWORD + PROXY_API_KEYS), put TLS in front
      # (nginx/Caddy or your platform's edge), then change this to "8000:8000".
      - "127.0.0.1:8000:8000"
    env_file: .env
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    volumes:
      - history:/data

volumes:
  history:
