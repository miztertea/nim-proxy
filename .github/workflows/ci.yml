name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

# A new push to the same ref supersedes the running CI for it (but never
# cancel main's post-merge runs — their results gate releases).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt, clippy, tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (toolchain via input)
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (unit + integration)
        run: cargo test
      - name: Dashboard JS syntax
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/dash.js"
          import re, pathlib
          html = pathlib.Path("src/dashboard.html").read_text()
          m = re.search(r"<script>\n(.*)</script>", html, re.S)
          assert m, "no <script> block found in src/dashboard.html"
          print(m.group(1))
          PY
          node --check "$RUNNER_TEMP/dash.js"

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (toolchain via input)
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-llvm-cov
      # The e2e suite spawns the real binary; the test harness forwards the
      # coverage profile path to the child and shuts it down gracefully under
      # llvm-cov, so subprocess coverage is captured. Gate at 80% lines.
      - name: Coverage (gate >= 80% lines)
        run: |
          {
            echo '```'
            cargo llvm-cov --summary-only --fail-under-lines 80
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks lists PR commits on pull_request runs
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history for the secret sweep
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: nim-proxy:ci
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci
      - name: Smoke test image
        run: |
          # A fresh container boots into setup-required mode (no env config
          # since v0.6.0); /health is public regardless, and the built-in
          # HEALTHCHECK must go healthy on it.
          docker run -d --name smoke -p 8000:8000 nim-proxy:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ "$ok" = 1 ] || { docker logs smoke; exit 1; }
          # HEALTHCHECK inside the container must also pass.
          for i in $(seq 1 30); do
            s=$(docker inspect -f '{{.State.Health.Status}}' smoke)
            [ "$s" = healthy ] && exit 0
            sleep 1
          done
          docker logs smoke; exit 1
