name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt, clippy, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (unit + integration)
        run: cargo test

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t nim-proxy:ci .
      - name: Smoke test image
        run: |
          docker run -d --name smoke -e NIM_API_KEYS=test-key -p 8000:8000 nim-proxy:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ "$ok" = 1 ] || { docker logs smoke; exit 1; }
          # HEALTHCHECK inside the container must also pass.
          for i in $(seq 1 30); do
            s=$(docker inspect -f '{{.State.Health.Status}}' smoke)
            [ "$s" = healthy ] && exit 0
            sleep 1
          done
          docker logs smoke; exit 1
