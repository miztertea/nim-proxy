name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

# A new push to the same ref supersedes the running CI for it (but never
# cancel main's post-merge runs — their results gate releases).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt, clippy, tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (toolchain via input)
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (unit + integration)
        run: cargo test
      - name: Dashboard JS syntax
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/dash.js"
          import re, pathlib
          html = pathlib.Path("src/dashboard.html").read_text()
          m = re.search(r"<script>\n(.*)</script>", html, re.S)
          assert m, "no <script> block found in src/dashboard.html"
          print(m.group(1))
          PY
          node --check "$RUNNER_TEMP/dash.js"

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (toolchain via input)
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@5ebac0d9522d786674368e47e92963ba13f2c376 # v2.82.11
        with:
          tool: cargo-llvm-cov
      # The e2e suite spawns the real binary; the test harness forwards the
      # coverage profile path to the child and shuts it down gracefully under
      # llvm-cov, so subprocess coverage is captured. Gate at 90% lines.
      - name: Coverage (gate >= 90% lines)
        run: |
          {
            echo '```'
            cargo llvm-cov --summary-only --fail-under-lines 90
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # rust-toolchain.toml (channel = stable) outranks `rustup default`, so
      # drop it here — this job's whole point is building with the declared
      # minimum, not stable. Keep this toolchain in lockstep with
      # `rust-version` in Cargo.toml.
      - run: rm rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (toolchain via input)
        with:
          toolchain: "1.87"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check with the minimum supported Rust
        run: cargo check --locked --all-targets

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks lists PR commits on pull_request runs
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history for the secret sweep
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-workflows:
    name: workflow lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # zizmor SARIF → code scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # actionlint: schema- and shellcheck-level correctness for the workflow
      # YAML — any finding is a real bug, so it always gates. Not in
      # install-action's registry, so it's a pinned release binary verified
      # against the published checksum (bump version + checksum together).
      - name: Install actionlint
        run: |
          set -euo pipefail
          curl -fsSLO https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint_1.7.12_linux_amd64.tar.gz" | sha256sum -c -
          tar xzf actionlint_1.7.12_linux_amd64.tar.gz actionlint
      - name: actionlint
        run: ./actionlint -color
      # zizmor: GitHub-Actions security lint (template injection, cache
      # poisoning, unpinned actions, …). The action uploads SARIF so every
      # severity is triageable in code scanning but never fails the build;
      # the CLI step below is the gate, and only on high-severity findings so
      # new low-noise rules can't block unrelated PRs.
      - name: zizmor (SARIF → code scanning)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
      - uses: taiki-e/install-action@5ebac0d9522d786674368e47e92963ba13f2c376 # v2.82.11
        with:
          tool: zizmor@1 # gate pinned to the same major the SARIF action bundles
      - name: zizmor (gate on high severity)
        run: zizmor --min-severity high .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # enables the online audits

  dependency-review:
    name: dependency review
    # The action diffs the PR's dependency graph against the base via the
    # GitHub API — it only makes sense (and only works) on pull requests.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # posts the failure summary as a PR comment
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      # No checkout: the action works purely against the dependency-graph API.
      # Blocks PRs that introduce crates with known vulnerabilities
      # (Cargo.lock is covered by the dependency graph). License policy stays
      # cargo-deny's job — deny.toml is the single source of license truth,
      # and double-gating against ClearlyDefined's spottier crate data would
      # only drift.
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low
          license-check: false
          comment-summary-in-pr: on-failure

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: nim-proxy:ci
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci
      - name: Smoke test image
        run: |
          # A fresh container boots into setup-required mode (no env config
          # since v0.6.0); /health is public regardless, and the built-in
          # HEALTHCHECK must go healthy on it.
          docker run -d --name smoke -p 8000:8000 nim-proxy:ci
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ "$ok" = 1 ] || { docker logs smoke; exit 1; }
          # HEALTHCHECK inside the container must also pass.
          for _ in $(seq 1 30); do
            s=$(docker inspect -f '{{.State.Health.Status}}' smoke)
            [ "$s" = healthy ] && exit 0
            sleep 1
          done
          docker logs smoke; exit 1
