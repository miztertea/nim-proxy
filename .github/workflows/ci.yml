name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt, clippy, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (unit + integration)
        run: cargo test
      - name: Dashboard JS syntax
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/dash.js"
          import re, pathlib
          html = pathlib.Path("src/dashboard.html").read_text()
          m = re.search(r"<script>\n(.*)</script>", html, re.S)
          assert m, "no <script> block found in src/dashboard.html"
          print(m.group(1))
          PY
          node --check "$RUNNER_TEMP/dash.js"

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # The e2e suite spawns the real binary; the test harness forwards the
      # coverage profile path to the child and shuts it down gracefully under
      # llvm-cov, so subprocess coverage is captured. Gate at 80% lines.
      - name: Coverage (gate >= 80% lines)
        run: |
          {
            echo '```'
            cargo llvm-cov --summary-only --fail-under-lines 80
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks lists PR commits on pull_request runs
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the secret sweep
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t nim-proxy:ci .
      - name: Smoke test image
        run: |
          docker run -d --name smoke -e NIM_API_KEYS=test-key -e INSECURE_NO_AUTH=true -p 8000:8000 nim-proxy:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ "$ok" = 1 ] || { docker logs smoke; exit 1; }
          # HEALTHCHECK inside the container must also pass.
          for i in $(seq 1 30); do
            s=$(docker inspect -f '{{.State.Health.Status}}' smoke)
            [ "$s" = healthy ] && exit 0
            sleep 1
          done
          docker logs smoke; exit 1
