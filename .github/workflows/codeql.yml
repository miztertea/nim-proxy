name: CodeQL

# Static analysis (SAST) for the Rust source. CodeQL's Rust support runs with
# build-mode: none — the extractor parses source without a cargo build — so
# the scan stays cheap. Findings land in Security → Code scanning; the weekly
# cron re-scans unchanged code as new queries ship.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "31 6 * * 2" # weekly, Tuesday 06:31 UTC

# Least privilege by default; the job opts into SARIF upload only.
permissions:
  contents: read

# A new push to the same ref supersedes the running scan (but never cancel
# main's post-merge runs).
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  analyze:
    name: codeql (rust)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload analysis results to code scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Known limitation, not a config problem: the Rust extractor reports
      # every file "extracted with errors" because macro expansion (even of
      # std macros like format!) is not fully supported yet — see
      # github/codeql#19966, #19982, #20659. Verified empirically: adding a
      # toolchain with rust-src plus `cargo fetch` changes nothing (identical
      # diagnostics), so no setup steps are cargo-culted here. The queries
      # still run on all non-macro code; expect the "extracted with errors"
      # metric to drop as the extractor matures with CodeQL bundle updates.
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: rust
          build-mode: none
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:rust"
