name: Release

# Two entry points, one pipeline:
#   - push of a v* tag (the classic path)
#   - workflow_dispatch from the default branch: resolves the version from
#     Cargo.toml, mints the tag itself, and continues — releases can be cut
#     from the Actions UI (or an API call) with no local terminal.
# The dispatch-minted tag is pushed with GITHUB_TOKEN, whose ref pushes
# deliberately trigger no follow-on workflow runs (GitHub suppresses them to
# prevent recursion) — which is exactly right here: THIS run carries the
# release end-to-end and never depends on the tag-push event.
#
# The image is built per-arch on NATIVE runners in parallel (amd64 on
# ubuntu-latest, arm64 on ubuntu-24.04-arm — free for public repos), pushed
# by digest, then stitched into one multi-arch manifest. QEMU emulation made
# the arm64 Rust compile the whole run's critical path (~30 min); native
# builds bring the release to a few minutes. Signing, provenance attestation,
# and the SBOM all target the final manifest digest.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Least privilege by default; each job opts into exactly what it needs.
permissions:
  contents: read

# One release at a time, never cancelled mid-flight: a cancelled run could
# leave a signed manifest without its GitHub release, or a minted tag without
# artifacts. A single global group (not per-ref) also serializes a dispatch
# racing a tag push — concurrent runs queue instead.
concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  prepare:
    name: resolve version (mint tag on dispatch)
    runs-on: ubuntu-latest
    permissions:
      contents: write # mints the v* tag on the dispatch path
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      minor: ${{ steps.resolve.outputs.minor }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked] credentials kept deliberately: this job pushes the minted v* tag
      - id: resolve

        name: Resolve version from Cargo.toml; mint the tag on dispatch
        # Context values reach the script via env, never inline `${{ }}` in
        # the run block (template-injection hygiene).
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
              echo "::error::dispatch releases run from the default branch only (got $GITHUB_REF_NAME)"
              exit 1
            fi
            if git ls-remote --exit-code origin "refs/tags/v$version" >/dev/null 2>&1; then
              echo "::error::v$version already exists — bump Cargo.toml (and promote the CHANGELOG) first"
              exit 1
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v$version" -m "nim-proxy $version" "$GITHUB_SHA"
            git push origin "v$version"
          else
            # The binary reports CARGO_PKG_VERSION; the image is labeled with
            # the git tag. Refuse to ship an image where the two disagree.
            if [ "$GITHUB_REF_NAME" != "v$version" ]; then
              echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $version"
              grep '^version = ' Cargo.toml
              exit 1
            fi
          fi
          {
            echo "version=$version"
            echo "minor=${version%.*}"
            echo "tag=v$version"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.arch }} (native)
    needs: prepare
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write # push per-arch image by digest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Labels only — tags are applied by the merge job on the manifest.
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          # Push by digest only; the merge job stitches the tagged manifest.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.arch }}
      # The documented multi-runner pattern: matrix job outputs clobber each
      # other, so each leg exports its digest as an artifact file instead.
      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
      # Extract the exact static binary we just shipped — natively on this
      # runner: create (not run) a container and copy /nim-proxy out.
      - name: Extract release binary
        run: |
          set -euo pipefail
          cid=$(docker create --platform "${{ matrix.platform }}" "${IMAGE}@${{ steps.build.outputs.digest }}")
          docker cp "$cid:/nim-proxy" "nim-proxy-${{ matrix.arch }}"
          docker rm "$cid" >/dev/null
          tar -czf "nim-proxy-${{ needs.prepare.outputs.version }}-linux-${{ matrix.arch }}.tar.gz" "nim-proxy-${{ matrix.arch }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.arch }}
          path: nim-proxy-*.tar.gz
          if-no-files-found: error

  merge:
    name: manifest → sign → attest → SBOM
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the tagged multi-arch manifest
      id-token: write # keyless cosign + provenance via OIDC
      attestations: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true
      - id: manifest
        name: Stitch the multi-arch manifest and tag it
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.prepare.outputs.version }}" \
            -t "${IMAGE}:${{ needs.prepare.outputs.minor }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
          digest=$(docker buildx imagetools inspect \
            "${IMAGE}:${{ needs.prepare.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
      - name: Sign image (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.manifest.outputs.digest }}"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.manifest.outputs.digest }}
          format: spdx-json
          output-file: nim-proxy-sbom.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: nim-proxy-sbom.spdx.json
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [prepare, merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "{binary-*,sbom}"
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # Explicit: on the dispatch path the triggering ref is a branch, so
          # the action must not derive the release tag from it.
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            nim-proxy-*.tar.gz
            nim-proxy-sbom.spdx.json
          body: |
            Container image (multi-arch, signed, with SBOM + provenance):

            ```sh
            docker pull ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }}
            ```

            Verify the signature:

            ```sh
            cosign verify ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }} \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/release.yml@.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```
